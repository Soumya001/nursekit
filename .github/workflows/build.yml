name: Build Nculator APK
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install EAS CLI
        run: npm install -g eas-cli
      - name: Install deps
        run: cd nculator && npm install --legacy-peer-deps
      - name: Setup EAS project
        run: cd nculator && bash setup-eas.sh
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      - name: Show app.json projectId
        run: cat nculator/app.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['expo'].get('extra',{}))"
      - name: EAS account info
        run: cd nculator && eas whoami && eas project:info 2>&1 || echo "project:info failed"
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      - name: Build APK (no wait)
        run: cd nculator && eas build --platform android --profile preview --non-interactive 2>&1
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

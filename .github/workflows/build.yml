name: Build Nculator APK
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install EAS CLI
        run: npm install -g eas-cli@latest
      - name: Install deps
        run: cd nculator && npm install --legacy-peer-deps
      - name: Setup EAS project
        run: cd nculator && bash setup-eas.sh
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      - name: EAS account info
        run: cd nculator && eas whoami && eas project:info 2>&1 || echo "project:info failed"
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      - name: Build APK
        id: eas_build
        run: |
          OUTPUT=$(cd nculator && eas build --platform android --profile preview --non-interactive --wait 2>&1)
          echo "$OUTPUT"
          APK_URL=$(echo "$OUTPUT" | grep -oE 'https://expo\.dev/artifacts/eas/[A-Za-z0-9_./-]+\.apk' | tail -1)
          echo "apk_url=$APK_URL" >> $GITHUB_OUTPUT
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      - name: Download APK
        run: |
          APK_URL="${{ steps.eas_build.outputs.apk_url }}"
          echo "Downloading APK from: $APK_URL"
          curl -L "$APK_URL" -o nculator-preview.apk
          ls -lh nculator-preview.apk
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "Nculator v${{ github.run_number }}"
          body: |
            Android APK built from commit ${{ github.sha }}

            Install by downloading `nculator-preview.apk` below.
          files: nculator-preview.apk
          draft: false
          prerelease: false
